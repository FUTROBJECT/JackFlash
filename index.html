<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#FFD43B" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="JackFlash" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Galindo&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Shrikhand&display=swap" rel="stylesheet" />
    <title>JackFlash</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { max-width: 100vw; overflow-x: hidden; -webkit-text-size-adjust: 100%; }
      input, button, select, textarea { font-size: 16px; } /* Prevent iOS zoom on focus */
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Unregister any old service workers — they were caching stale JS and breaking persistence
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          if (registrations.length > 0) {
            console.log("[JF] Found", registrations.length, "service worker(s) — unregistering...");
            registrations.forEach((r) => r.unregister());
          } else {
            console.log("[JF] No service workers found (good)");
          }
        });
        if ("caches" in window) {
          caches.keys().then((keys) => {
            if (keys.length > 0) {
              console.log("[JF] Clearing", keys.length, "cache(s):", keys);
              keys.forEach((k) => caches.delete(k));
            }
          });
        }
      }
      // Quick localStorage test
      try {
        localStorage.setItem("_jf_test", "1");
        const t = localStorage.getItem("_jf_test");
        localStorage.removeItem("_jf_test");
        console.log("[JF] localStorage test:", t === "1" ? "WORKING" : "BROKEN");
      } catch (e) {
        console.error("[JF] localStorage BLOCKED:", e);
      }
    </script>
  </body>
</html>
